<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3D Model Viewer - Impressify3D</title>
  <link rel="stylesheet" href="style.css">
  <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: #f5f5f7;
      color: #1d1d1f;
    }
    .viewer-container {
      max-width: 1200px;
      margin: 80px auto 40px auto;
      padding: 0 20px;
      position: relative;
    }
    .canvas-container {
      background: #ffffff;
      border-radius: 18px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
      overflow: hidden;
      position: relative;
      width: 100%;
      height: 70vh;
    }
    model-viewer {
      width: 100%;
      height: 100%;
      --poster-color: transparent;
    }
    .loading-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #ffffff;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 10;
      transition: opacity 0.3s ease;
    }
    .loading-overlay.hidden {
      opacity: 0;
      pointer-events: none;
    }
    .spinner {
      width: 50px;
      height: 50px;
      border: 3px solid #e5e5e7;
      border-top: 3px solid #0071e3;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-bottom: 16px;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    .info-panel {
      margin-top: 24px;
      background: #ffffff;
      border-radius: 18px;
      padding: 24px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
    }
    .model-title {
      font-size: 24px;
      font-weight: 600;
      margin: 0 0 8px 0;
      letter-spacing: -0.5px;
    }
    .model-description {
      color: #86868b;
      line-height: 1.5;
      margin: 0;
    }
    .upload-container {
      max-width: 1200px;
      margin: 20px auto;
      padding: 0 20px;
    }
    .upload-box {
      border: 2px dashed #d2d2d7;
      border-radius: 12px;
      padding: 30px;
      text-align: center;
      background: #ffffff;
      cursor: pointer;
      transition: border-color 0.2s ease;
    }
    .upload-box:hover {
      border-color: #0071e3;
    }
    .upload-box input[type="file"] {
      display: none;
    }
    .upload-label {
      color: #0071e3;
      font-weight: 500;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <header style="position: fixed; top: 0; width: 100%; background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(20px); z-index: 100; border-bottom: 1px solid #e5e5e7;">
    <nav style="max-width: 1200px; margin: 0 auto; padding: 16px 20px; display: flex; justify-content: space-between; align-items: center;">
      <a href="index.html" style="font-weight: 600; text-decoration: none; color: #1d1d1f; font-size: 19px;">Impressify3D</a>
      <ul class="nav-links" style="display: flex; list-style: none; gap: 24px; margin: 0; padding: 0;"></ul>
    </nav>
  </header>

  <div class="viewer-container">
    <div id="loader" class="loading-overlay">
      <div class="spinner"></div>
      <p id="loading-text">Loading 3D Model...</p>
    </div>
    <div class="canvas-container">
      <model-viewer id="main-viewer" camera-controls auto-rotate shadow-intensity="1" environment-image="neutral" exposure="1"></model-viewer>
    </div>
    <div class="info-panel">
      <h1 id="viewer-title" class="model-title">3D Model Viewer</h1>
      <p id="viewer-desc" class="model-description">Loading model details...</p>
    </div>
  </div>

  <div class="upload-container">
    <div class="upload-box" onclick="document.getElementById('file-input').click()">
      <label for="file-input" class="upload-label">
        <span>Click to upload or drag a <strong>.glb</strong> file here</span>
      </label>
      <input type="file" id="file-input" accept=".glb" />
    </div>
  </div>

  <script src="datamodel.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      initViewer();
    });

    async function initViewer() {
      const viewer = document.getElementById('main-viewer');
      const loader = document.getElementById('loader');
      const loadingText = document.getElementById('loading-text');
      const titleElem = document.getElementById('viewer-title');
      const descElem = document.getElementById('viewer-desc');
      const fileInput = document.getElementById('file-input');

      viewer.addEventListener('progress', (event) => {
        const progress = Math.round(event.detail.totalProgress * 100);
        loadingText.innerText = `Loading... ${progress}%`;
        if (progress >= 100) {
          loader.classList.add('hidden');
        }
      });

      viewer.addEventListener('load', () => {
        loader.classList.add('hidden');
      });

      viewer.addEventListener('error', (err) => {
        loadingText.innerText = "Error loading model.";
        console.error(err);
      });

      const urlParams = new URLSearchParams(window.location.search);
      const modelId = urlParams.get('id');

      const items = await loadItems();
      const currentItem = items.find(item => item.id === modelId) || items[0];

      if (currentItem) {
        viewer.src = ''; // Clear source to handle sequential load updates cleanly
        titleElem.innerText = currentItem.title;
        descElem.innerText = currentItem.gallery_desc;
        viewer.src = githubUrl(currentItem.model_github_path);
      } else {
        loader.classList.add('hidden');
        titleElem.innerText = "No Model Selected";
        descElem.innerText = "Please select a model from the gallery.";
      }

      fileInput.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (file && file.name.endsWith('.glb')) {
          loader.classList.remove('hidden');
          loadingText.innerText = "Loading local file...";
          const objectURL = URL.createObjectURL(file);
          titleElem.innerText = file.name;
          descElem.innerText = "Local file preview.";
          viewer.src = ''; 
          viewer.src = objectURL;
        }
      });
    }
  </script>
</body>
</html>
